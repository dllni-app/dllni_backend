name: Laravel Full Test Suite

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  full-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, bcmath, intl, gd
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate

      - name: Migrate database
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run full Laravel test suite
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        shell: bash
        run: |
          set -o pipefail
          php artisan test 2>&1 | tee laravel-full-test-suite.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laravel-full-test-suite-diagnostics
          path: laravel-full-test-suite.log
          if-no-files-found: ignore
