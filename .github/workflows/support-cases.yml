name: Support Cases

on:
  pull_request:
    paths:
      - 'app/**'
      - 'Modules/**'
      - 'database/**'
      - 'routes/**'
      - 'tests/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/support-cases.yml'

jobs:
  support-cases:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, bcmath, intl, gd
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate

      - name: Migrate database
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run support case tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test tests/Feature/SupportCases/SupportCaseApiTest.php

      - name: Check formatting
        run: vendor/bin/pint --test app/Enums/SupportCaseKind.php app/Enums/SupportCasePriority.php app/Enums/SupportCaseReporterRole.php app/Enums/SupportCaseResolution.php app/Enums/SupportCaseStatus.php app/Models/SupportCase.php app/Models/SupportCaseMessage.php app/Models/SupportCaseEvent.php app/Services/SupportCaseService.php app/Services/LegacySupportCaseSyncService.php app/Http/Controllers/API/SupportCaseController.php app/Filament/Resources/SupportCases tests/Feature/SupportCases/SupportCaseApiTest.php
